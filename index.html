<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>凯格尔运动计时器 · 多语言</title>
    <style>
        /* ===== 全局重置 & 基础 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #f5f7fa 0%, #e9edf5 100%);
            padding: 20px;
            margin: 0;
        }

        /* ===== 主卡片 ===== */
        .container {
            background: rgba(255, 255, 255, 0.80);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 40px 36px 32px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08), 0 8px 24px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: background 0.3s ease;
        }

        /* ===== 头部 ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #1e293b;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header h1 .badge {
            display: inline-block;
            background: #eef2ff;
            color: #6C63FF;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 12px;
            border-radius: 30px;
            letter-spacing: 0.3px;
            margin-left: 2px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .lang-toggle {
            background: rgba(0, 0, 0, 0.04);
            border: none;
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
            line-height: 1;
            border: 1px solid transparent;
        }
        .lang-toggle:hover {
            background: rgba(108, 99, 255, 0.08);
            color: #6C63FF;
            border-color: #6C63FF40;
        }

        .settings-toggle {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: #94a3b8;
            padding: 6px 8px;
            border-radius: 12px;
            transition: all 0.2s ease;
            line-height: 1;
        }
        .settings-toggle:hover {
            color: #475569;
            background: rgba(0, 0, 0, 0.04);
        }
        .settings-toggle.active {
            color: #6C63FF;
            transform: rotate(60deg);
        }

        /* ===== 计时器环形区域 ===== */
        .timer-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 8px 0 12px;
            position: relative;
        }

        .circle-wrapper {
            position: relative;
            width: 220px;
            height: 220px;
            cursor: pointer;
        }

        .circle-wrapper svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .circle-bg {
            fill: none;
            stroke: #e9edf5;
            stroke-width: 8;
        }

        .circle-progress {
            fill: none;
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.3s ease, stroke 0.4s ease;
        }

        .circle-center {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .phase-label {
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #94a3b8;
            transition: color 0.4s ease;
            margin-bottom: 2px;
        }
        .phase-label.tense {
            color: #ef4444;
        }
        .phase-label.relax {
            color: #14b8a6;
        }
        .phase-label.completed {
            color: #f59e0b;
        }

        .time-number {
            font-size: 72px;
            font-weight: 700;
            line-height: 1;
            color: #1e293b;
            transition: color 0.4s ease;
            letter-spacing: -2px;
            font-feature-settings: "tnum";
        }
        .time-number.tense {
            color: #ef4444;
        }
        .time-number.relax {
            color: #14b8a6;
        }
        .time-number.completed {
            color: #f59e0b;
        }

        .time-unit {
            font-size: 16px;
            font-weight: 400;
            color: #94a3b8;
            margin-top: 2px;
        }

        /* ===== 进度信息 ===== */
        .progress-info {
            margin-top: 16px;
            font-size: 15px;
            font-weight: 500;
            color: #64748b;
            letter-spacing: 0.3px;
            background: rgba(0, 0, 0, 0.03);
            padding: 6px 20px;
            border-radius: 40px;
            display: inline-block;
        }
        .progress-info strong {
            color: #1e293b;
            font-weight: 600;
        }

        /* ===== 控制按钮 ===== */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            border: none;
            border-radius: 60px;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-width: 100px;
        }
        .btn:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: #6C63FF;
            color: #fff;
            box-shadow: 0 4px 14px rgba(108, 99, 255, 0.30);
        }
        .btn-primary:hover {
            background: #5a52e0;
            box-shadow: 0 6px 20px rgba(108, 99, 255, 0.35);
            transform: translateY(-1px);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: #f1f4f9;
            color: #475569;
        }
        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .btn-success {
            background: #14b8a6;
            color: #fff;
            box-shadow: 0 4px 14px rgba(20, 184, 166, 0.30);
        }
        .btn-success:hover {
            background: #0d9488;
            box-shadow: 0 6px 20px rgba(20, 184, 166, 0.35);
            transform: translateY(-1px);
        }

        .btn-danger {
            background: #ef4444;
            color: #fff;
            box-shadow: 0 4px 14px rgba(239, 68, 68, 0.25);
        }
        .btn-danger:hover {
            background: #dc2626;
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.30);
            transform: translateY(-1px);
        }

        .btn-outline {
            background: transparent;
            color: #64748b;
            border: 1.5px solid #e2e8f0;
            min-width: 56px;
            padding: 12px 16px;
        }
        .btn-outline:hover {
            background: #f1f4f9;
            border-color: #cbd5e1;
        }

        /* ===== 设置面板 ===== */
        .settings-panel {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1.5px solid #e9edf5;
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                opacity 0.3s ease,
                padding 0.3s ease;
            padding-left: 4px;
            padding-right: 4px;
        }
        .settings-panel.open {
            max-height: 420px;
            opacity: 1;
            padding-bottom: 8px;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
            margin-bottom: 18px;
        }

        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .setting-item label {
            font-size: 13px;
            font-weight: 500;
            color: #64748b;
            letter-spacing: 0.2px;
        }

        .setting-item .input-group {
            display: flex;
            align-items: center;
            background: #f1f4f9;
            border-radius: 12px;
            overflow: hidden;
            border: 1.5px solid transparent;
            transition: border-color 0.2s ease;
        }
        .setting-item .input-group:focus-within {
            border-color: #6C63FF;
            background: #fff;
        }

        .setting-item .input-group button {
            background: none;
            border: none;
            padding: 6px 10px;
            font-size: 18px;
            cursor: pointer;
            color: #94a3b8;
            transition: color 0.2s ease;
            font-weight: 500;
            line-height: 1;
            user-select: none;
        }
        .setting-item .input-group button:hover {
            color: #1e293b;
        }

        .setting-item .input-group input {
            border: none;
            background: transparent;
            padding: 8px 0;
            width: 48px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
            outline: none;
            font-feature-settings: "tnum";
        }
        .setting-item .input-group input[type="number"]::-webkit-inner-spin-button,
        .setting-item .input-group input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .setting-item .input-group input[type="number"] {
            -moz-appearance: textfield;
        }

        .setting-item .unit-hint {
            font-size: 12px;
            color: #94a3b8;
            text-align: center;
            margin-top: 2px;
        }

        .settings-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .settings-actions .btn {
            min-width: 80px;
            padding: 10px 20px;
            font-size: 14px;
        }

        /* ===== 完成状态动画 ===== */
        @keyframes celebrate {
            0% {
                transform: scale(1);
            }
            30% {
                transform: scale(1.08);
            }
            60% {
                transform: scale(0.96);
            }
            100% {
                transform: scale(1);
            }
        }

        .celebrate .circle-wrapper {
            animation: celebrate 0.6s ease 3;
        }

        @keyframes confetti-fall {
            0% {
                opacity: 1;
                transform: translateY(-20px) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(60px) rotate(720deg);
            }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            pointer-events: none;
            z-index: 999;
            animation: confetti-fall 1.8s ease-out forwards;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 480px) {
            .container {
                padding: 28px 20px 24px;
                border-radius: 32px;
            }
            .circle-wrapper {
                width: 180px;
                height: 180px;
            }
            .time-number {
                font-size: 56px;
            }
            .phase-label {
                font-size: 15px;
            }
            .time-unit {
                font-size: 14px;
            }
            .controls {
                flex-wrap: wrap;
                gap: 10px;
            }
            .btn {
                min-width: 76px;
                padding: 10px 18px;
                font-size: 14px;
                flex: 1;
                min-width: 60px;
            }
            .settings-grid {
                grid-template-columns: 1fr 1fr 1fr;
                gap: 10px;
            }
            .setting-item .input-group input {
                width: 36px;
                font-size: 14px;
            }
            .header h1 {
                font-size: 17px;
            }
            .progress-info {
                font-size: 13px;
                padding: 4px 16px;
            }
            .lang-toggle {
                font-size: 12px;
                padding: 4px 10px;
            }
        }

        @media (max-width: 400px) {
            .circle-wrapper {
                width: 150px;
                height: 150px;
            }
            .time-number {
                font-size: 44px;
            }
            .phase-label {
                font-size: 13px;
            }
            .container {
                padding: 20px 14px 18px;
            }
            .settings-grid {
                gap: 6px;
            }
            .setting-item .input-group input {
                width: 30px;
                font-size: 13px;
                padding: 6px 0;
            }
            .setting-item .input-group button {
                padding: 4px 6px;
                font-size: 15px;
            }
        }

        /* ===== 工具类 ===== */
        .hidden {
            display: none !important;
        }

        .text-center {
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container" id="app">
        <!-- 头部 -->
        <div class="header">
            <div class="header-left">
                <h1>
                    <span>🧘</span>
                    <span data-i18n="appTitle">凯格尔</span>
                    <span class="badge" data-i18n="badge">训练</span>
                </h1>
            </div>
            <div class="header-actions">
                <button class="lang-toggle" id="langToggle">English</button>
                <button class="settings-toggle" id="settingsToggle" aria-label="设置" title="设置">
                    ⚙️
                </button>
            </div>
        </div>

        <!-- 计时器主体 -->
        <div class="timer-section" id="timerSection">
            <div class="circle-wrapper" id="circleWrapper">
                <svg viewBox="0 0 220 220">
                    <!-- 背景环 -->
                    <circle class="circle-bg" cx="110" cy="110" r="96" />
                    <!-- 进度环 -->
                    <circle class="circle-progress" id="progressRing"
                    cx="110" cy="110" r="96"
                    stroke="#6C63FF"
                    stroke-dasharray="603.1858"
                    stroke-dashoffset="603.1858" />
                </svg>
                <div class="circle-center">
                    <div class="phase-label" id="phaseLabel" data-i18n="phaseReady">准备</div>
                    <div class="time-number" id="timeNumber">--</div>
                    <div class="time-unit" data-i18n="unitSeconds">秒</div>
                </div>
            </div>

            <div class="progress-info" id="progressInfo">
                <span data-i18n="progress">第 <strong id="currentCycleDisplay">0</strong> 组 / 共 <strong id="totalCyclesDisplay">15</strong> 组</span>
            </div>
        </div>

        <!-- 控制按钮 -->
        <div class="controls">
            <button class="btn btn-primary" id="startBtn" data-i18n="btnStart">▶ 开始</button>
            <button class="btn btn-outline" id="resetBtn" title="重置">↺</button>
        </div>

        <!-- ===== 设置面板 ===== -->
        <div class="settings-panel" id="settingsPanel">
            <div class="settings-grid">
                <!-- 紧绷时间 -->
                <div class="setting-item">
                    <label data-i18n="settingsTense">💪 紧绷</label>
                    <div class="input-group">
                        <button class="dec-btn" data-target="tenseTime">−</button>
                        <input type="number" id="tenseTimeInput" value="10" min="1" max="120" />
                        <button class="inc-btn" data-target="tenseTime">+</button>
                    </div>
                    <div class="unit-hint" data-i18n="hintSeconds">秒</div>
                </div>

                <!-- 放松时间 -->
                <div class="setting-item">
                    <label data-i18n="settingsRelax">😌 放松</label>
                    <div class="input-group">
                        <button class="dec-btn" data-target="relaxTime">−</button>
                        <input type="number" id="relaxTimeInput" value="5" min="1" max="120" />
                        <button class="inc-btn" data-target="relaxTime">+</button>
                    </div>
                    <div class="unit-hint" data-i18n="hintSeconds">秒</div>
                </div>

                <!-- 循环次数 -->
                <div class="setting-item">
                    <label data-i18n="settingsCycles">🔄 循环</label>
                    <div class="input-group">
                        <button class="dec-btn" data-target="totalCycles">−</button>
                        <input type="number" id="totalCyclesInput" value="15" min="1" max="99" />
                        <button class="inc-btn" data-target="totalCycles">+</button>
                    </div>
                    <div class="unit-hint" data-i18n="hintSeconds">组</div>
                </div>
            </div>

            <div class="settings-actions">
                <button class="btn btn-secondary" id="resetSettingsBtn" data-i18n="settingsReset">恢复默认</button>
                <button class="btn btn-primary" id="applySettingsBtn" data-i18n="settingsApply">✓ 应用</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ============================================================
            //  多语言字典
            // ============================================================
            const translations = {
                zh: {
                    appTitle: '凯格尔',
                    badge: '训练',
                    phaseTense: '💪 紧绷',
                    phaseRelax: '😌 放松',
                    phaseReady: '准备',
                    phaseComplete: '🎉 完成!',
                    unitSeconds: '秒',
                    progress: '第 <strong>{current}</strong> 组 / 共 <strong>{total}</strong> 组',
                    settingsTense: '💪 紧绷',
                    settingsRelax: '😌 放松',
                    settingsCycles: '🔄 循环',
                    settingsApply: '✓ 应用',
                    settingsReset: '恢复默认',
                    btnStart: '▶ 开始',
                    btnPause: '⏸ 暂停',
                    btnResume: '▶ 继续',
                    btnRestart: '↻ 再来',
                    hintSeconds: '秒',
                    toggleLang: 'English',
                },
                en: {
                    appTitle: 'Kegel',
                    badge: 'Trainer',
                    phaseTense: '💪 Tense',
                    phaseRelax: '😌 Relax',
                    phaseReady: 'Ready',
                    phaseComplete: '🎉 Done!',
                    unitSeconds: 'sec',
                    progress: 'Set <strong>{current}</strong> / <strong>{total}</strong>',
                    settingsTense: '💪 Tense',
                    settingsRelax: '😌 Relax',
                    settingsCycles: '🔄 Cycles',
                    settingsApply: '✓ Apply',
                    settingsReset: 'Reset Default',
                    btnStart: '▶ Start',
                    btnPause: '⏸ Pause',
                    btnResume: '▶ Resume',
                    btnRestart: '↻ Again',
                    hintSeconds: 'sec',
                    toggleLang: '中文',
                }
            };

            // ============================================================
            //  状态
            // ============================================================
            const state = {
                // 用户设置
                tenseTime: 10,
                relaxTime: 5,
                totalCycles: 15,

                // 运行时
                status: 'idle', // idle | running | paused | completed
                phase: 'tense', // tense | relax
                currentCycle: 0,
                remaining: 10,
                timerId: null,

                // 语言
                lang: 'zh', // 'zh' | 'en'
            };

            // ============================================================
            //  DOM 引用
            // ============================================================
            const $ = (sel) => document.querySelector(sel);
            const $$ = (sel) => document.querySelectorAll(sel);

            const progressRing = $('#progressRing');
            const phaseLabel = $('#phaseLabel');
            const timeNumber = $('#timeNumber');
            const timeUnit = $('.time-unit');
            const currentCycleDisplay = $('#currentCycleDisplay');
            const totalCyclesDisplay = $('#totalCyclesDisplay');
            const startBtn = $('#startBtn');
            const resetBtn = $('#resetBtn');
            const settingsToggle = $('#settingsToggle');
            const settingsPanel = $('#settingsPanel');
            const circleWrapper = $('#circleWrapper');
            const timerSection = $('#timerSection');
            const progressInfo = $('#progressInfo');
            const langToggle = $('#langToggle');

            const tenseTimeInput = $('#tenseTimeInput');
            const relaxTimeInput = $('#relaxTimeInput');
            const totalCyclesInput = $('#totalCyclesInput');
            const applySettingsBtn = $('#applySettingsBtn');
            const resetSettingsBtn = $('#resetSettingsBtn');

            // ============================================================
            //  常量
            // ============================================================
            const CIRCUMFERENCE = 2 * Math.PI * 96; // ≈ 603.1858

            // ============================================================
            //  翻译函数
            // ============================================================
            function t(key, params = {}) {
                const dict = translations[state.lang] || translations.zh;
                let text = dict[key] || key;
                // 简单插值 {current} {total}
                Object.keys(params).forEach((k) => {
                    text = text.replace(new RegExp(`\\{${k}\\}`, 'g'), params[k]);
                });
                return text;
            }

            // ============================================================
            //  更新界面语言 (静态元素)
            // ============================================================
            function updateStaticLanguage() {
                // 所有带 data-i18n 的元素
                document.querySelectorAll('[data-i18n]').forEach((el) => {
                    const key = el.dataset.i18n;
                    if (key) {
                        // 跳过动态更新的元素 (phaseLabel, timeUnit, progressInfo, startBtn 由 updateDisplay 控制)
                        // 但我们可以更新静态部分，例如 header、settings labels 等
                        // 但 phaseLabel, timeUnit, progressInfo, startBtn 我们会通过 updateDisplay 刷新，
                        // 不过为了保险，这里排除这几个动态ID
                        const id = el.id;
                        if (id === 'phaseLabel' || id === 'startBtn' || el === timeUnit || el === progressInfo) {
                            return;
                        }
                        el.textContent = t(key);
                    }
                });

                // 更新 langToggle 按钮文字
                langToggle.textContent = t('toggleLang');

                // 更新设置面板的 label 和 hint (它们有 data-i18n)
                document.querySelectorAll('.setting-item label[data-i18n]').forEach(el => {
                    el.textContent = t(el.dataset.i18n);
                });
                document.querySelectorAll('.setting-item .unit-hint[data-i18n]').forEach(el => {
                    el.textContent = t(el.dataset.i18n);
                });
                // 更新设置按钮
                document.querySelectorAll('.settings-actions .btn[data-i18n]').forEach(el => {
                    el.textContent = t(el.dataset.i18n);
                });
                // 更新重置按钮 title (可选的)
                resetBtn.title = t('btnReset') || '↺';
            }

            // ============================================================
            //  核心逻辑
            // ============================================================

            function updateRing(progress) {
                const offset = CIRCUMFERENCE * (1 - Math.min(progress, 1));
                progressRing.style.strokeDashoffset = offset;
            }

            function updateDisplay() {
                const { status, phase, currentCycle, totalCycles, remaining, tenseTime, relaxTime } = state;

                // --- 数字 & 阶段 ---
                if (status === 'idle') {
                    timeNumber.textContent = '--';
                    phaseLabel.textContent = t('phaseReady');
                    phaseLabel.className = 'phase-label';
                    timeNumber.className = 'time-number';
                    timeUnit.textContent = t('unitSeconds');
                    updateRing(0);
                } else if (status === 'completed') {
                    timeNumber.textContent = '🎉';
                    phaseLabel.textContent = t('phaseComplete');
                    phaseLabel.className = 'phase-label completed';
                    timeNumber.className = 'time-number completed';
                    timeUnit.textContent = '';
                    updateRing(1);
                } else {
                    timeNumber.textContent = remaining;
                    const labelKey = phase === 'tense' ? 'phaseTense' : 'phaseRelax';
                    phaseLabel.textContent = t(labelKey);
                    phaseLabel.className = 'phase-label ' + phase;
                    timeNumber.className = 'time-number ' + phase;
                    timeUnit.textContent = t('unitSeconds');

                    const total = phase === 'tense' ? tenseTime : relaxTime;
                    const progress = total > 0 ? 1 - (remaining / total) : 0;
                    updateRing(progress);
                }

                // --- 进度文字 (包含插值) ---
                const currentVal = Math.min(currentCycle, totalCycles);
                progressInfo.innerHTML = t('progress', {
                    current: currentVal,
                    total: totalCycles
                });
                // 重新绑定强标签 (虽然innerHTML已经包含了，但我们需要确保引用有效)
                // 但因为我们用innerHTML重建，之前的引用会失效，但没关系，我们只显示。

                // --- 完成状态样式 ---
                timerSection.classList.toggle('celebrate', status === 'completed');

                // --- 按钮文字 ---
                if (status === 'running') {
                    startBtn.textContent = t('btnPause');
                    startBtn.className = 'btn btn-secondary';
                } else if (status === 'paused') {
                    startBtn.textContent = t('btnResume');
                    startBtn.className = 'btn btn-primary';
                } else if (status === 'completed') {
                    startBtn.textContent = t('btnRestart');
                    startBtn.className = 'btn btn-primary';
                } else {
                    startBtn.textContent = t('btnStart');
                    startBtn.className = 'btn btn-primary';
                }
            }

            // ============================================================
            //  音效
            // ============================================================
            function playBeep(freq = 880, duration = 160, type = 'sine') {
                try {
                    const ctx = new(window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = type;
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration / 1000);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + duration / 1000);
                } catch (_) { /* 静默降级 */ }
            }

            function playPhaseBeep() {
                playBeep(660, 120, 'sine');
                setTimeout(() => playBeep(880, 120, 'sine'), 130);
            }

            function playCompleteBeep() {
                [0, 180, 360, 540].forEach((delay) => {
                    setTimeout(() => playBeep(660 + delay * 0.3, 150, 'sine'), delay);
                });
            }

            // ============================================================
            //  计时器控制
            // ============================================================
            function nextPhase() {
                const { phase, currentCycle, totalCycles, tenseTime, relaxTime } = state;

                if (phase === 'tense') {
                    state.phase = 'relax';
                    state.remaining = relaxTime;
                    playPhaseBeep();
                } else {
                    const newCycle = currentCycle + 1;
                    state.currentCycle = newCycle;
                    if (newCycle >= totalCycles) {
                        state.status = 'completed';
                        state.phase = 'tense';
                        state.remaining = tenseTime;
                        clearInterval(state.timerId);
                        state.timerId = null;
                        playCompleteBeep();
                        updateDisplay();
                        return;
                    }
                    state.phase = 'tense';
                    state.remaining = tenseTime;
                    playPhaseBeep();
                }
                updateDisplay();
            }

            function tick() {
                if (state.status !== 'running') return;
                state.remaining -= 1;
                if (state.remaining <= 0) {
                    state.remaining = 0;
                    updateDisplay();
                    nextPhase();
                } else {
                    updateDisplay();
                }
            }

            function startTimer() {
                if (state.status === 'completed') {
                    resetTimer();
                    setTimeout(() => startTimer(), 50);
                    return;
                }

                if (state.status === 'idle') {
                    state.phase = 'tense';
                    state.remaining = state.tenseTime;
                    state.currentCycle = 0;
                    state.status = 'running';
                    updateDisplay();
                    playBeep(520, 100, 'sine');
                    state.timerId = setInterval(tick, 1000);
                    return;
                }

                if (state.status === 'paused') {
                    state.status = 'running';
                    updateDisplay();
                    state.timerId = setInterval(tick, 1000);
                    return;
                }
            }

            function pauseTimer() {
                if (state.status === 'running') {
                    state.status = 'paused';
                    clearInterval(state.timerId);
                    state.timerId = null;
                    updateDisplay();
                }
            }

            function resetTimer() {
                clearInterval(state.timerId);
                state.timerId = null;
                state.status = 'idle';
                state.phase = 'tense';
                state.remaining = state.tenseTime;
                state.currentCycle = 0;
                timerSection.classList.remove('celebrate');
                updateDisplay();
                updateRing(0);
            }

            // ============================================================
            //  设置应用
            // ============================================================
            function applySettings() {
                let tVal = parseInt(tenseTimeInput.value, 10);
                let rVal = parseInt(relaxTimeInput.value, 10);
                let cVal = parseInt(totalCyclesInput.value, 10);

                if (isNaN(tVal) || tVal < 1) tVal = 1;
                if (isNaN(rVal) || rVal < 1) rVal = 1;
                if (isNaN(cVal) || cVal < 1) cVal = 1;

                tVal = Math.min(Math.max(tVal, 1), 120);
                rVal = Math.min(Math.max(rVal, 1), 120);
                cVal = Math.min(Math.max(cVal, 1), 99);

                tenseTimeInput.value = tVal;
                relaxTimeInput.value = rVal;
                totalCyclesInput.value = cVal;

                const changed = (state.tenseTime !== tVal || state.relaxTime !== rVal || state.totalCycles !== cVal);

                state.tenseTime = tVal;
                state.relaxTime = rVal;
                state.totalCycles = cVal;

                if (state.status === 'running' || state.status === 'paused') {
                    resetTimer();
                } else {
                    resetTimer();
                }

                updateDisplay();

                if (changed) {
                    playBeep(440, 80, 'sine');
                }
            }

            function resetToDefault() {
                tenseTimeInput.value = 10;
                relaxTimeInput.value = 5;
                totalCyclesInput.value = 15;
                applySettings();
                playBeep(660, 100, 'sine');
            }

            // ============================================================
            //  语言切换
            // ============================================================
            function setLanguage(lang) {
                if (state.lang === lang) return;
                state.lang = lang;
                // 更新静态文本
                updateStaticLanguage();
                // 更新动态显示 (按钮、阶段等)
                updateDisplay();
                // 更新设置面板里的输入框提示 (已经通过 updateStaticLanguage 更新)
                // 更新 langToggle 文字
                langToggle.textContent = t('toggleLang');
                // 播放点击反馈
                playBeep(500, 80, 'sine');
            }

            // ============================================================
            //  事件绑定
            // ============================================================

            // --- 语言切换 ---
            langToggle.addEventListener('click', function() {
                const nextLang = state.lang === 'zh' ? 'en' : 'zh';
                setLanguage(nextLang);
            });

            // --- 开始 / 暂停 ---
            startBtn.addEventListener('click', function() {
                if (state.status === 'running') {
                    pauseTimer();
                } else {
                    startTimer();
                }
            });

            // --- 重置 ---
            resetBtn.addEventListener('click', function() {
                resetTimer();
                playBeep(400, 80, 'sine');
            });

            // --- 设置面板折叠 ---
            settingsToggle.addEventListener('click', function() {
                const isOpen = settingsPanel.classList.toggle('open');
                this.classList.toggle('active', isOpen);
            });

            // --- 数字加减 ---
            document.querySelectorAll('.inc-btn, .dec-btn').forEach((btn) => {
                btn.addEventListener('click', function() {
                    const targetId = this.dataset.target;
                    let input;
                    if (targetId === 'tenseTime') input = tenseTimeInput;
                    else if (targetId === 'relaxTime') input = relaxTimeInput;
                    else if (targetId === 'totalCycles') input = totalCyclesInput;
                    else return;

                    let val = parseInt(input.value, 10) || 0;
                    const isInc = this.classList.contains('inc-btn');
                    const step = isInc ? 1 : -1;
                    val = val + step;

                    const min = 1;
                    const max = targetId === 'totalCycles' ? 99 : 120;
                    val = Math.min(Math.max(val, min), max);

                    input.value = val;
                });
            });

            [tenseTimeInput, relaxTimeInput, totalCyclesInput].forEach((input) => {
                input.addEventListener('blur', function() {
                    let val = parseInt(this.value, 10);
                    const isCycle = this.id === 'totalCyclesInput';
                    const min = 1;
                    const max = isCycle ? 99 : 120;
                    if (isNaN(val) || val < min) val = min;
                    if (val > max) val = max;
                    this.value = val;
                });
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        applySettingsBtn.click();
                    }
                });
            });

            // --- 应用设置 ---
            applySettingsBtn.addEventListener('click', applySettings);

            // --- 恢复默认 ---
            resetSettingsBtn.addEventListener('click', resetToDefault);

            // --- 键盘快捷键 ---
            document.addEventListener('keydown', function(e) {
                if (e.target.tagName === 'INPUT') return;
                if (e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    startBtn.click();
                }
                if (e.key === 'r' || e.key === 'R') {
                    resetBtn.click();
                }
            });

            // --- 点击环 ---
            circleWrapper.addEventListener('click', function() {
                startBtn.click();
            });

            // ============================================================
            //  初始化
            // ============================================================
            function init() {
                // 读取默认值
                state.tenseTime = parseInt(tenseTimeInput.value, 10) || 10;
                state.relaxTime = parseInt(relaxTimeInput.value, 10) || 5;
                state.totalCycles = parseInt(totalCyclesInput.value, 10) || 15;
                state.remaining = state.tenseTime;
                state.currentCycle = 0;
                state.status = 'idle';
                state.phase = 'tense';
                state.lang = 'zh';

                // 设置静态语言
                updateStaticLanguage();
                // 更新显示
                updateDisplay();
                updateRing(0);
                // 面板默认折叠
                settingsPanel.classList.remove('open');
                settingsToggle.classList.remove('active');
            }

            init();

            // 清理定时器
            window.addEventListener('beforeunload', function() {
                if (state.timerId) {
                    clearInterval(state.timerId);
                }
            });

            console.log('🧘 凯格尔运动计时器 · 多语言版已加载');
            console.log('💡 快捷键: 空格=开始/暂停, R=重置');
            console.log('🌐 点击 "English/中文" 切换语言');

        })();
    </script>

</body>
</html>
